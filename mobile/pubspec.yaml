name: food_ai_app
description: AI-powered food analysis app
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ─── Сеть ────────────────────────────────────────────────────────────────
  http: ^1.2.0

  # ─── Камера и сканер ────────────────────────────────────────────────────
  image_picker: ^1.1.2
  mobile_scanner: ^5.1.1

  # ─── Локальное хранилище ────────────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ─── Firebase Auth (Google + Apple Sign-In) ─────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.3
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
