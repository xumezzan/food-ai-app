# ─────────────────────────────────────────────────────────────────────────────
# Nginx — Load Balancer для Food AI API
#
# Схема работы:
#   Client → Nginx (порт 80) → Upstream (api_1, api_2, api_3, ...)
#
# Nginx сам round-robin раскидывает запросы между репликами FastAPI.
# При падении одной реплики Nginx перестает слать на неё запросы.
# ─────────────────────────────────────────────────────────────────────────────

# Количество рабочих процессов (auto = число CPU ядер)
worker_processes auto;

events {
    # Максимум соединений на 1 worker
    worker_connections 4096;
    # Принимать несколько новых соединений за раз (эффективнее)
    multi_accept on;
}

http {
    # ─── Upstream (пул FastAPI-серверов) ──────────────────────────────────────
    upstream food_api {
        # least_conn — отправляем к серверу с наименьшим числом активных соединений
        # (умнее, чем round-robin: не шлём новые запросы к уже загруженному серверу)
        least_conn;

        # Docker Swarm / Compose автоматически разрезолвит "api" в несколько IP
        server api:8000;

        # Keepalive: держим 64 постоянных соединения к бэкенду
        # (не открываем новый TCP за каждый запрос)
        keepalive 64;
    }

    # ─── Общие настройки ──────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Таймаут keepalive клиента
    keepalive_timeout 65;

    # Отключаем показ версии nginx (безопасность)
    server_tokens off;

    # Максимальный размер тела запроса (важно для загрузки фото)
    client_max_body_size 20M;

    # Логи
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Gzip-сжатие ответов
    gzip on;
    gzip_types application/json application/octet-stream text/plain;
    gzip_min_length 1024;

    # ─── Сервер ───────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;   # Принимаем любой домен (задай свой на проде)

        # Проброс запросов в FastAPI
        location / {
            proxy_pass         http://food_api;
            proxy_http_version 1.1;

            # Поддержка keepalive к upstream
            proxy_set_header   Connection        "";

            # Передаём реальный IP клиента в fastapi (для логов и rate-limit)
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Таймауты (важно для AI — Gemini может отвечать 3-5 сек)
            proxy_connect_timeout  5s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }

        # Health-check Nginx (для мониторинга)
        location /nginx-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
